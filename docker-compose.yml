services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - '${VITE_HOST_PORT:-5173}:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - dot_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  dot_node_modules:

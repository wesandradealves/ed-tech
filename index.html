<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste Frontend EdTech</title>
  </head>
  <body>
    <main class="page">
      <section class="o-hero-banner" aria-labelledby="hero-title" data-component="hero-banner">
        <div class="l-wrapper l-wrapper--hero">
          <div class="o-hero-banner__content">
            <div class="o-hero-banner__text-block">
              <h1 class="o-hero-banner__title" id="hero-title">
                <span>Lorem ipsum</span>
                <span>dolor, sit <em>amet</em></span>
              </h1>
              <p class="o-hero-banner__description">
                It is a long established fact that a reader will be distracted by
                the readable content of a page when looking at its layout.
              </p>
              <button class="a-button a-button--primary o-hero-banner__button" type="button" data-action="hero-play-video">
                <span>Lorem Ipsum</span>
                <svg
                  class="o-hero-banner__button-icon"
                  width="14"
                  height="14"
                  viewBox="0 0 14 14"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M10.1458 7.5H0V5.83333H10.1458L5.47917 1.16667L6.66667 0L13.3333 6.66667L6.66667 13.3333L5.47917 12.1667L10.1458 7.5Z" fill="currentColor" />
                </svg>
              </button>
            </div>

            <div class="o-hero-banner__visual-wrap">
              <img
                class="o-hero-banner__visual"
                src="/assets/Container (1).png"
                alt="Interface ilustrativa do módulo"
                width="560"
                height="436"
              />
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
    />
    <link rel="stylesheet" href="/src/styles/main.scss" />
    <title>Carregando...</title>
  </head>
  <body>
    <a class="a-skip-link" href="#conteudo-principal" data-role="skip-link">Pular para o conteúdo principal</a>

    <main class="page" id="conteudo-principal" tabindex="-1">
      <section class="o-hero-banner" data-component="hero-banner" data-props='{"contentPath":"hero","values":{"videoUrlPath":"video.heroExternalUrl"}}'></section>
      <section class="o-video-intro" data-component="video-intro" data-props='{"contentPath":"video"}'></section>
      <section class="o-wave-text" data-component="wave-text" data-props='{"contentPath":"waveText"}'></section>
      <section class="o-forest-slider" data-component="forest-slider" data-props='{"contentPath":"forestSlider"}'></section>
      <section class="o-dark-text-box" data-component="dark-text-box" data-props='{"contentPath":"darkTextBox"}'></section>
      <section class="o-reveal-cards" data-component="reveal-cards" data-props='{"contentPath":"revealCards"}'></section>
      <section class="o-audio-player" data-component="audio-player" data-props='{"contentPath":"audioPlayer"}'></section>
      <section class="o-activity-panel" data-component="activity-panel" data-props='{"contentPath":"activities.discursive","values":{"activityType":"discursive","activityId":"discursive"}}'></section>
      <section class="o-activity-panel" data-component="activity-panel" data-props='{"contentPath":"activities.objective","values":{"activityType":"objective","activityId":"objective"}}'></section>
      <section class="o-faq-accordion" data-component="faq-accordion" data-props='{"contentPath":"faq"}'></section>
    </main>

    <footer class="o-footer" data-component="site-footer" data-props='{"contentPath":"footer"}'></footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
